<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhTube</title>
    <!-- DaisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .active {
            background-color: #FF1F3D;
            color: white;
        }
    </style>
</head>

<body class="w-11/12 mx-auto mt-[40px]">
    <header>
        <nav class=" flex justify-between  border-b-2  border-gray-300 pb-7">
            <div class="logo"><img src="./design/Logo.png" alt=""></div>
            <div class="mid">
                <label class="input relative right-16">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="searchEng" type="search" required placeholder="Search" />
                </label>
            </div>
            <div class="blog"><button class="btn btn-error text-white">Blogs</button></div>
        </nav>
        <!-- <hr class=" mt-[20px] font-bold text-gray-300"> -->
    </header>
    <nav id="catagory" class="flex py-5 justify-center gap-5">
        <div>
            <button id="btn-all" onclick="loadVideos()" class="btn btn-sm ">All</button>
        </div>


    </nav>

    <section id="videoContainer" class="mx-auto grid grid-cols-4 gap-3 h-full">


    </section>

    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
    <dialog id="video_details" class="modal">
        <div class="modal-box">
            <div id="del-container"></div>
            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
    </dialog>



    <!-- Script -->
    <script src="./script/script.js"></script>
</body>

</html>
